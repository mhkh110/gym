<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>کهکشان تمرین | ردیاب هوشمند</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --hover: #1e1e2a;
      --primary: #8b5cf6;
        },
        'پنجشنبه': {
          pre: ['برنج قهوه‌ای', 'بوقلمون', 'سویا'],
          warmup: 'هوازی سبک · Band Pull Apart · Wall Slide · Arm Circle',
          ex: [
            { name: 'نشر جانب دمبل', sets: '5×15', rest: 45 },
            { name: 'نشر جانب کابل', sets: '3×15', rest: 45 },
            { name: 'نشر خم دمبل', sets: '4×15', rest: 45 },
            { name: 'پرس آرنولدی', sets: '3×10', rest: 75 },
            { name: 'شراگ دمبل', sets: '3×12', rest: 60 },
            { name: 'دیپ دستگاه', sets: '3×10', rest: 60 },
            { name: 'پشت بازو طناب', sets: '3×15', rest: 45 },
            { name: 'جلو بازو تناوبی', sets: '3×12', rest: 60 },
            { name: 'جلو بازو چکشی طناب', sets: '3×15', rest: 45 }
          ],
          cooldown: 'کشش سرشانه و سینه'
        },
        'جمعه': {
          pre: [],
          warmup: 'پیاده‌روی سبک (اختیاری) · خواب کافی · آب کافی · ریکاوری',
          ex: [],
          cooldown: '',
          rest: true
        }
      };

      const CORRECTIVE = [
        { name: 'Chin Tuck', desc: 'کنترل اسکاپولا و گردن' },
        { name: 'Wall Slide', desc: 'حرکت آهسته' },
        { name: 'Band Pull Apart', desc: 'باز کردن شانه‌ها' },
        { name: 'Face Pull (سبک)', desc: 'تمرکز روی پشت شانه' },
        { name: 'Doorway Chest Stretch', desc: 'کاهش قفل‌شدگی سینه' },
        { name: 'Dead Hang', desc: 'آویزان شدن از بارفیکس' },
        { name: 'Scapular Push-up', desc: 'کنترل حرکت کتف' }
      ];

      const PRINCIPLES = [
        'کنترل کامل حرکت در تمام دامنه',
        'فاز منفی: ۲ تا ۳ ثانیه',
        'RIR حدود ۱ تا ۲ در اکثر ست‌ها',
        'افزایش وزنه فقط وقتی تمام ست‌ها و تکرارها با فرم صحیح انجام شوند',
        'استراحت شبانه ۷ تا ۹ ساعت',
        'ثبت وزن بدن هر هفته',
        'ثبت رکورد هر حرکت در هر جلسه',
        '۵ تا ۱۰ دقیقه گرم کردن و ۵ دقیقه سرد کردن در هر جلسه'
      ];

      let activeDay = WEEK[todayIdx];
      let logs = JSON.parse(localStorage.getItem('wt2_logs') || '{}');
      let history = JSON.parse(localStorage.getItem('wt2_history') || '[]');
      let weights = JSON.parse(localStorage.getItem('wt2_weights') || '[]');

      function save() {
        localStorage.setItem('wt2_logs', JSON.stringify(logs));
        localStorage.setItem('wt2_history', JSON.stringify(history));
        localStorage.setItem('wt2_weights', JSON.stringify(weights));
      }

      function showToast(m) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = m;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2200);
      }

      function searchExercise(name) {
        const query = encodeURIComponent(name + ' تمرین بدنسازی');
        window.open('https://www.google.com/search?q=' + query, '_blank');
      }

      function getLastRecordForDayExercise(day, exerciseName) {
        if (!logs[day]) return null;
        return logs[day][exerciseName] || null;
      }

      function renderTabs() {
        const c = document.getElementById('dayTabs');
        c.innerHTML = WEEK.map(d => {
          const isActive = d === activeDay;
          const isRest = PROGRAM[d]?.rest;
          const isComplete = !isRest && PROGRAM[d]?.ex?.length > 0 &&
            PROGRAM[d].ex.every(ex => logs[d]?.[ex.name]);
          let cls = isActive ? 'active' : '';
          if (isRest) cls += ' rest-day';
          if (isComplete && !isActive && !isRest) cls += ' completed-day';
          return `<span class="tab ${cls}" data-day="${d}">${d}</span>`;
        }).join('');
        c.querySelectorAll('.tab').forEach(t => {
          t.onclick = () => {
            activeDay = t.dataset.day;
            renderTabs();
            renderDay();
          };
        });
      }

      function renderDay() {
        const d = activeDay;
        const p = PROGRAM[d] || { pre: [], warmup: '', ex: [], cooldown: '' };
        const isRest = p.rest;
        const html = `
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>🥗 تغذیه ${isRest ? 'روز استراحت' : 'قبل تمرین (۶۰ تا ۹۰ دقیقه قبل)'}</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">${p.pre.length ? p.pre.join(' · ') : (isRest ? 'تغذیه آزاد (کالری حدود ۲۷۰۰)' : '---')}</div>
        </div>
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>🔥 گرم کردن${isRest ? ' / فعالیت' : ' (۱۰ دقیقه)'}</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">${p.warmup || '---'}</div>
        </div>
        ${p.ex.length > 0 ? `
        <div class="card">
          <div class="section-header"><span>💪 تمرین اصلی</span></div>
          ${p.ex.map((ex, i) => {
            const lastRecord = getLastRecordForDayExercise(d, ex.name);
            const prevWeight = lastRecord ? lastRecord.weight : '';
            const prevReps = lastRecord ? lastRecord.reps : '';
            return `
            <div class="exercise-row">
              <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:150px; cursor:pointer;" onclick="searchExercise('${ex.name.replace(/'/g, "\\'")}')" title="جستجو در گوگل">
                <span class="search-icon">🔍</span>
                <div>
                  <span class="ex-name">${ex.name}</span>
                  <div class="ex-meta">${ex.sets} · استراحت ${ex.rest}ث</div>
                  ${lastRecord ? `<span class="prev-record">📋 جلسه قبل: ${lastRecord.weight}kg × ${lastRecord.reps}</span>` : ''}
                </div>
              </div>
              <div class="input-group" onclick="event.stopPropagation()">
                <input placeholder="وزنه" value="${prevWeight}" class="w-inp">
                <input placeholder="تکرار" value="${prevReps}" class="r-inp">
                <button class="small-btn primary save-ex ripple">ذخیره</button>
              </div>
            </div>`;
          }).join('')}
          <div class="progress"><div class="progress-fill" id="dayProgress"></div></div>
        </div>
        ` : ''}
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>🧊 سرد کردن</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">${p.cooldown || '---'}</div>
        </div>
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>🦴 حرکات اصلاحی (هر روز ۸ تا ۱۰ دقیقه)</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">
            ${CORRECTIVE.map(c => `
              <div class="exercise-row" onclick="searchExercise('${c.name.replace(/'/g, "\\'")}')" style="cursor:pointer;">
                <div style="display:flex; align-items:center; gap:8px; flex:1;">
                  <span class="search-icon">🔍</span>
                  <div>
                    <span class="ex-name">${c.name}</span>
                    <div class="ex-meta">${c.desc}</div>
                  </div>
                </div>
                <span class="badge-pr" style="font-size:10px;">روزانه</span>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>⭐ اصول اجرا</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">
            ${PRINCIPLES.map(p => `<div style="padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05);">• ${p}</div>`).join('')}
          </div>
        </div>
      `;
        document.getElementById('dayContent').innerHTML = html;
        attachEvents(d);
        updateProgress(d);
      }

      function attachEvents(day) {
        document.querySelectorAll('.save-ex').forEach(b => {
          b.onclick = (e) => {
            e.stopPropagation();
            const row = e.target.closest('.exercise-row');
            const name = row.querySelector('.ex-name').textContent;
            const w = row.querySelector('.w-inp').value;
            const r = row.querySelector('.r-inp').value;
            if (!logs[day]) logs[day] = {};
            const prev = logs[day][name];
            const isNewPR = prev && parseFloat(w) > parseFloat(prev.weight || '0');
            logs[day][name] = { weight: w, reps: r, date: todayStr(), time: new Date().toLocaleTimeString() };
            history.push({ name, weight: w, reps: r, date: todayStr(), day });
            save();
            updateProgress(day);
            if (isNewPR) showToast('🏆 PR جدید!');
            else showToast('ذخیره شد');
            renderDay();
          };
        });
      }

      function updateProgress(day) {
        const p = PROGRAM[day]?.ex || [];
        const log = logs[day] || {};
        const done = p.filter(e => log[e.name]).length;
        const pct = p.length ? (done / p.length) * 100 : 0;
        const fill = document.getElementById('dayProgress');
        if (fill) fill.style.width = pct + '%';
        if (pct === 100 && p.length) {
          showToast('✅ تمرین امروز کامل شد');
          renderTabs();
        }
      }

      window.toggleSection = (el) => {
        const collapsible = el.nextElementSibling;
        const chevron = el.querySelector('.chevron');
        if (collapsible.style.display === 'none') {
          collapsible.style.display = 'block';
          if (chevron) chevron.textContent = '▼';
        } else {
          collapsible.style.display = 'none';
          if (chevron) chevron.textContent = '▶';
        }
      };

      let timerId;

      function startFloatingTimer(sec) {
        clearInterval(timerId);
        let rem = sec;
        const disp = document.getElementById('timerDisplay');
        timerId = setInterval(() => {
          disp.textContent = rem + 'ث';
          if (rem-- <= 0) {
            clearInterval(timerId);
            disp.textContent = '';
            showToast('استراحت تمام شد');
          }
        }, 1000);
      }
      window.startFloatingTimer = startFloatingTimer;

      function renderHistory() {
        const q = document.getElementById('searchInput')?.value?.toLowerCase() || '';
        const filtered = history.filter(r => r.name?.toLowerCase().includes(q) || r.day?.includes(q) || r.date?.includes(q));
        document.getElementById('historyList').innerHTML = filtered.map(r => `
        <div class="history-card">
          <div><b>${r.name}</b> (${r.day}) ${r.date}</div>
          <div>${r.weight}kg × ${r.reps}</div>
          <button onclick="deleteRec('${r.date}','${r.name}')" class="ripple">🗑️</button>
        </div>`).join('') || '<p style="color:var(--text-secondary);">موردی یافت نشد</p>';
      }

      window.deleteRec = (date, name) => {
        history = history.filter(r => !(r.date === date && r.name === name));
        save();
        renderHistory();
      };

      function renderDashboard() {
        const totalSessions = history.length;
        const bestWeight = history.length ? Math.max(...history.map(r => parseFloat(r.weight) || 0)) : 0;
        const lastWeight = weights.slice(-1)[0]?.weight || '---';
        document.getElementById('statsGrid').innerHTML = `
        <div class="card">📅 جلسات: ${totalSessions}</div>
        <div class="card">🏆 بهترین وزنه: ${bestWeight}kg</div>
        <div class="card">⚖️ وزن بدن: ${lastWeight}</div>
        <div class="card">📊 رکوردها: ${history.length}</div>
      `;
        const ctx = document.getElementById('progressChart')?.getContext('2d');
        if (ctx) {
          const wData = weights.map(w => w.weight);
          ctx.clearRect(0, 0, 400, 180);
          if (wData.length > 1) {
            const max = Math.max(...wData);
            const min = Math.min(...wData);
            const range = max - min || 1;
            ctx.strokeStyle = '#c084fc';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = '#8b5cf6';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            wData.forEach((v, i) => {
              const x = (i / (wData.length - 1)) * 380 + 10;
              const y = 180 - ((v - min) / range) * 140 - 20;
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.shadowBlur = 0;
          }
        }
      }

      function switchView(v) {
        document.getElementById('viewTracker').style.display = v === 'tracker' ? 'block' : 'none';
        document.getElementById('viewHistory').style.display = v === 'history' ? 'block' : 'none';
        document.getElementById('viewDashboard').style.display = v === 'dashboard' ? 'block' : 'none';
        if (v === 'history') renderHistory();
        if (v === 'dashboard') renderDashboard();
      }
      window.switchView = switchView;

      window.exportData = () => {
        const blob = new Blob([JSON.stringify({ logs, history, weights })], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'کهکشان_تمرین_پشتیبان.json';
        a.click();
      };

      document.getElementById('todayDate').textContent = WEEK[todayIdx] + ' ' + todayStr();
      document.getElementById('searchInput')?.addEventListener('input', renderHistory);
      renderTabs();
      renderDay();

      if (!weights.length || new Date(weights.slice(-1)[0]?.date) < new Date(Date.now() - 7 * 86400000)) {
        setTimeout(() => {
          const w = prompt('وزن این هفته خود را وارد کنید (کیلوگرم):');
          if (w && !isNaN(w)) {
            weights.push({ date: todayStr(), weight: parseFloat(w) });
            save();
            showToast('وزن ثبت شد');
          }
        }, 600);
      }
    })();
  </script>
</body>
</html>
