<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>کهکشان تمرین | ردیاب هوشمند</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --hover: #1e1e2a;
      --primary: #8b5cf6;
      --accent: #a78bfa;
      --accent-glow: #c084fc;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f1f6;
      --text-secondary: #a1a1b5;
      --border: #252530;
      --glass: rgba(18, 18, 30, 0.75);
      --nebula-1: rgba(139, 92, 246, 0.12);
      --nebula-2: rgba(59, 130, 246, 0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, var(--nebula-1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, var(--nebula-2) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(168, 85, 247, 0.07) 0%, transparent 60%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='1.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    .app {
      max-width: 960px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .header {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.12), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #c084fc, #8b5cf6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo svg {
      width: 28px;
      height: 28px;
      fill: url(#logoGradient);
    }
    .today-badge {
      background: rgba(139, 92, 246, 0.15);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 14px;
      color: #c4b5fd;
      border: 1px solid rgba(139, 92, 246, 0.25);
    }
    .nav-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    button {
      background: var(--card);
      border: 1px solid rgba(139, 92, 246, 0.2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    button:hover {
      background: var(--hover);
      border-color: var(--primary);
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.25);
      transform: translateY(-1px);
    }
    button.primary {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border-color: #8b5cf6;
      color: white;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
    }
    button.primary:hover {
      background: linear-gradient(135deg, #9d6fff, #8b5cf6);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.55);
    }
    button.ripple::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.25) 10%, transparent 10%);
      background-repeat: no-repeat;
      background-position: 50%;
      transform: scale(10, 10);
      opacity: 0;
      transition: transform 0.5s, opacity 0.8s;
    }
    button.ripple:active::after {
      transform: scale(0, 0);
      opacity: 0.4;
      transition: 0s;
    }
    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 4px 0;
      scrollbar-width: thin;
    }
    .tab {
      padding: 9px 16px;
      background: rgba(18, 18, 26, 0.8);
      border-radius: 30px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid rgba(139, 92, 246, 0.2);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 14px;
      backdrop-filter: blur(10px);
      color: var(--text-secondary);
    }
    .tab.active {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border-color: #8b5cf6;
      color: white;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.45);
    }
    .tab.rest-day {
      opacity: 0.45;
      border-color: rgba(255,255,255,0.08);
      color: #6b6b7b;
      cursor: pointer;
      pointer-events: auto;
    }
    .tab.rest-day.active {
      opacity: 0.7;
      background: rgba(30, 30, 40, 0.8);
      border-color: rgba(255,255,255,0.15);
      color: #b0b0c0;
    }
    .tab.completed-day {
      border-color: var(--success) !important;
      color: var(--success) !important;
      box-shadow: 0 0 14px rgba(34, 197, 94, 0.3);
    }
    .card {
      background: rgba(18, 18, 26, 0.75);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.08) inset;
      backdrop-filter: blur(14px);
      margin-bottom: 10px;
      transition: border-color 0.3s;
    }
    .card:hover {
      border-color: rgba(139, 92, 246, 0.4);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .section-header .chevron {
      transition: transform 0.2s;
      font-size: 12px;
      color: var(--accent);
    }
    .collapsible {
      transition: all 0.2s;
    }
    .exercise-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(30, 30, 44, 0.65);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      flex-wrap: wrap;
      border: 1px solid rgba(139, 92, 246, 0.12);
      transition: all 0.25s;
      backdrop-filter: blur(6px);
    }
    .exercise-row:hover {
      border-color: rgba(139, 92, 246, 0.4);
      background: rgba(40, 40, 60, 0.7);
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.12);
    }
    .ex-name {
      font-weight: 700;
      font-size: 15px;
      display: block;
      color: #e9e9f0;
    }
    .ex-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .prev-record {
      font-size: 12px;
      color: #c4b5fd;
      background: rgba(139, 92, 246, 0.15);
      padding: 2px 10px;
      border-radius: 12px;
      display: inline-block;
      margin-top: 4px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .badge-pr {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0a0a0f;
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: bold;
      font-size: 11px;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
    }
    .input-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    input {
      background: rgba(30, 30, 44, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: white;
      padding: 8px 10px;
      border-radius: 20px;
      width: 70px;
      font-size: 14px;
      transition: all 0.25s;
      backdrop-filter: blur(6px);
    }
    input::placeholder {
      font-size: 13px;
    }
    input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 14px rgba(139, 92, 246, 0.35);
    }
    .small-btn {
      padding: 6px 12px;
      font-size: 12px;
    }
    .progress {
      height: 5px;
      background: rgba(37, 37, 50, 0.7);
      border-radius: 10px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #a78bfa, #c084fc);
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }
    .floating-timer {
      position: sticky;
      bottom: 12px;
      background: rgba(18, 18, 26, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.35);
      border-radius: 50px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      z-index: 50;
      box-shadow: 0 8px 28px rgba(139, 92, 246, 0.2);
    }
    .timer-btn {
      background: rgba(40, 40, 60, 0.7);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      border-color: rgba(139, 92, 246, 0.3);
    }
    .timer-btn:hover {
      background: rgba(139, 92, 246, 0.25);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      color: #e9e9f0;
      padding: 12px;
      border-radius: 40px;
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
      z-index: 999;
      animation: fadeInUp 0.35s ease;
      border: 1px solid rgba(139, 92, 246, 0.4);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    canvas {
      width: 100%;
      border-radius: 12px;
      background: rgba(18, 18, 26, 0.6);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .history-card {
      background: rgba(30, 30, 44, 0.65);
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid rgba(139, 92, 246, 0.12);
      backdrop-filter: blur(8px);
    }
    .search-icon {
      color: var(--accent);
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">

      <defs>

      <div class="card"><canvas id="progressChart" height="180"></canvas></div>

        'ثبت وزن بدن هر هفته',
        'ثبت رکورد هر حرکت در هر جلسه',
        '۵ تا ۱۰ دقیقه گرم کردن و ۵ دقیقه سرد کردن در هر جلسه'
      ];

      let activeDay = WEEK[todayIdx];
      let logs = {};
      let history = [];

      function showToast(m) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = m;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2200);
      }

      function searchExercise(name) {
        const query = encodeURIComponent(name + ' تمرین بدنسازی');
        window.open('https://www.google.com/search?q=' + query, '_blank');
      }

      function getLastRecordForDayExercise(day, exerciseName) {
        if (!logs[day]) return null;
        return logs[day][exerciseName] || null;
      }

      function renderTabs() {
        const c = document.getElementById('dayTabs');
        c.innerHTML = WEEK.map(d => {
          const isActive = d === activeDay;
          const isRest = PROGRAM[d]?.rest;
          const isComplete = !isRest && PROGRAM[d]?.ex?.length > 0 &&
            PROGRAM[d].ex.every(ex => logs[d]?.[ex.name]);
          let cls = isActive ? 'active' : '';
          if (isRest) cls += ' rest-day';
          if (isComplete && !isActive && !isRest) cls += ' completed-day';
          return `<span class="tab ${cls}" data-day="${d}">${d}</span>`;
        }).join('');
        c.querySelectorAll('.tab').forEach(t => {
          t.onclick = () => {
            activeDay = t.dataset.day;
            renderTabs();
            renderDay();
          };
        });
      }

      function renderDay() {
        const d = activeDay;
        const p = PROGRAM[d] || { pre: [], warmup: '', ex: [], cooldown: '' };
        const isRest = p.rest;
        const html = `
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>تغذیه ${isRest ? '(استراحت)' : '(قبل تمرین)'}</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">${p.pre.length ? p.pre.join(' · ') : (isRest ? 'آزاد' : '---')}</div>
        </div>
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>گرم کردن${isRest ? ' (فعالیت)' : ''}</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">${p.warmup || '---'}</div>
        </div>
        ${p.ex.length > 0 ? `
        <div class="card">
          <div class="section-header"><span>تمرین اصلی</span></div>
          ${p.ex.map((ex, i) => {
            const lastRecord = getLastRecordForDayExercise(d, ex.name);
            const prevWeight = lastRecord ? lastRecord.weight : '';
            const prevReps = lastRecord ? lastRecord.reps : '';
            return `
            <div class="exercise-row">
              <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:150px; cursor:pointer;" onclick="searchExercise('${ex.name.replace(/'/g, "\\'")}')" title="جستجو">
                <span class="search-icon">🔍</span>
                <div>
                  <span class="ex-name">${ex.name}</span>
                  <div class="ex-meta">${ex.sets} · ${ex.rest}s</div>
                  ${lastRecord ? `<span class="prev-record">${lastRecord.weight}kg × ${lastRecord.reps}</span>` : ''}
                </div>
              </div>
              <div class="input-group" onclick="event.stopPropagation()">
                <input placeholder="kg" value="${prevWeight}" class="w-inp">
                <input placeholder="reps" value="${prevReps}" class="r-inp">
                <button class="small-btn primary save-ex ripple">ذخیره</button>
              </div>
            </div>`;
          }).join('')}
          <div class="progress"><div class="progress-fill" id="dayProgress"></div></div>
        </div>
        ` : ''}
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>سرد کردن</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">${p.cooldown || '---'}</div>
        </div>
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>حرکات اصلاحی</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">
            ${CORRECTIVE.map(c => `
              <div class="exercise-row" onclick="searchExercise('${c.name.replace(/'/g, "\\'")}')" style="cursor:pointer;">
                <div style="display:flex; align-items:center; gap:8px; flex:1;">
                  <span class="search-icon">🔍</span>
                  <div>
                    <span class="ex-name">${c.name}</span>
                    <div class="ex-meta">${c.desc}</div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="card">
          <div class="section-header" onclick="toggleSection(this)">
            <span>اصول</span><span class="chevron">▼</span>
          </div>
          <div class="collapsible">
            ${PRINCIPLES.map(p => `<div style="padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05);">• ${p}</div>`).join('')}
          </div>
        </div>
      `;
        document.getElementById('dayContent').innerHTML = html;
        attachEvents(d);
        updateProgress(d);
      }

      function attachEvents(day) {
        document.querySelectorAll('.save-ex').forEach(b => {
          b.onclick = (e) => {
            e.stopPropagation();
            const row = e.target.closest('.exercise-row');
            const name = row.querySelector('.ex-name').textContent;
            const w = row.querySelector('.w-inp').value;
            const r = row.querySelector('.r-inp').value;
            if (!logs[day]) logs[day] = {};
            const prev = logs[day][name];
            const isNewPR = prev && parseFloat(w) > parseFloat(prev.weight || '0');
            logs[day][name] = { weight: w, reps: r, date: todayStr(), time: new Date().toLocaleTimeString() };
            history.push({ name, weight: w, reps: r, date: todayStr(), day });
            updateProgress(day);
            if (isNewPR) showToast('🏆 PR جدید!');
            else showToast('ذخیره شد');
            renderDay();
          };
        });
      }

      function updateProgress(day) {
        const p = PROGRAM[day]?.ex || [];
        const log = logs[day] || {};
        const done = p.filter(e => log[e.name]).length;
        const pct = p.length ? (done / p.length) * 100 : 0;
        const fill = document.getElementById('dayProgress');
        if (fill) fill.style.width = pct + '%';
        if (pct === 100 && p.length) {
          showToast('✅ تمرین امروز کامل شد');
          renderTabs();
        }
      }

      window.toggleSection = (el) => {
        const collapsible = el.nextElementSibling;
        const chevron = el.querySelector('.chevron');
        if (collapsible.style.display === 'none') {
          collapsible.style.display = 'block';
          if (chevron) chevron.textContent = '▼';
        } else {
          collapsible.style.display = 'none';
          if (chevron) chevron.textContent = '▶';
        }
      };

      let timerId;

      function startFloatingTimer(sec) {
        clearInterval(timerId);
        let rem = sec;
        const disp = document.getElementById('timerDisplay');
        timerId = setInterval(() => {
          disp.textContent = rem + 's';
          if (rem-- <= 0) {
            clearInterval(timerId);
            disp.textContent = '';
            showToast('تایمر تمام شد');
          }
        }, 1000);
      }
      window.startFloatingTimer = startFloatingTimer;

      function renderHistory() {
        const q = document.getElementById('searchInput')?.value?.toLowerCase() || '';
        const filtered = history.filter(r => r.name?.toLowerCase().includes(q) || r.day?.includes(q) || r.date?.includes(q));
        document.getElementById('historyList').innerHTML = filtered.map(r => `
        <div class="history-card">
          <div><b>${r.name}</b> (${r.day}) ${r.date}</div>
          <div>${r.weight}kg × ${r.reps}</div>
        </div>`).join('') || '<p style="color:var(--text-secondary);">موردی یافت نشد</p>';
      }

      window.deleteRec = (date, name) => {
        history = history.filter(r => !(r.date === date && r.name === name));
        renderHistory();
      };

      function renderDashboard() {
        const totalSessions = history.length;
        const bestWeight = history.length ? Math.max(...history.map(r => parseFloat(r.weight) || 0)) : 0;
        document.getElementById('statsGrid').innerHTML = `
        <div class="card">📅 جلسات: ${totalSessions}</div>
        <div class="card">🏆 بهترین وزنه: ${bestWeight}kg</div>
        <div class="card">📊 رکوردها: ${history.length}</div>
      `;
        const ctx = document.getElementById('progressChart')?.getContext('2d');
        if (ctx && history.length > 0) {
          ctx.clearRect(0, 0, 400, 180);
          const weights = [...new Set(history.map(r => parseFloat(r.weight) || 0))].sort((a, b) => a - b);
          if (weights.length > 1) {
            const max = Math.max(...weights);
            const min = Math.min(...weights);
            const range = max - min || 1;
            ctx.strokeStyle = '#c084fc';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = '#8b5cf6';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            weights.forEach((v, i) => {
              const x = (i / (weights.length - 1)) * 380 + 10;
              const y = 180 - ((v - min) / range) * 140 - 20;
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.shadowBlur = 0;
          }
        }
      }

      function switchView(v) {
        document.getElementById('viewTracker').style.display = v === 'tracker' ? 'block' : 'none';
        document.getElementById('viewHistory').style.display = v === 'history' ? 'block' : 'none';
        document.getElementById('viewDashboard').style.display = v === 'dashboard' ? 'block' : 'none';
        if (v === 'history') renderHistory();
        if (v === 'dashboard') renderDashboard();
      }
      window.switchView = switchView;

      window.exportData = () => {
        const blob = new Blob([JSON.stringify({ logs, history })], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'کهکشان_تمرین.json';
        a.click();
      };

      document.getElementById('todayDate').textContent = WEEK[todayIdx] + ' ' + todayStr();
      document.getElementById('searchInput')?.addEventListener('input', renderHistory);
      renderTabs();
      renderDay();
    })();
  </script>
</body>
</html>
